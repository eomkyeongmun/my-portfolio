name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# PR 동시 실행 방지 — 같은 PR에 새 커밋이 오면 이전 실행을 취소
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Job 1: 빌드 테스트 (PR + main push 모두 실행)
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Build Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (static export)
        # NEXT_PUBLIC_PDF_API_URL 없이도 빌드는 통과 (PR 테스트용)
        run: npm run build

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2: 정적 사이트 → S3 업로드 + CloudFront 캐시 무효화
  #         main 브랜치 push 시에만 실행
  # ──────────────────────────────────────────────────────────────────────────
  build-and-deploy-static:
    name: Build & Deploy Static (S3 + CloudFront)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (next build → out/)
        # NEXT_PUBLIC_PDF_API_URL: 정적 빌드 시 클라이언트 코드에 API Gateway URL을 주입
        env:
          NEXT_PUBLIC_PDF_API_URL: ${{ secrets.PDF_API_URL }}
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload to S3
        run: |
          aws s3 sync out/ "s3://${{ secrets.S3_BUCKET_NAME }}" \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --exclude "*.json"
          # HTML·JSON은 캐시 무효화가 쉽도록 짧은 TTL
          aws s3 sync out/ "s3://${{ secrets.S3_BUCKET_NAME }}" \
            --delete \
            --cache-control "public, max-age=0, must-revalidate" \
            --include "*.html" \
            --include "*.json"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"

  # ──────────────────────────────────────────────────────────────────────────
  # Job 3: Lambda 컨테이너 이미지 빌드 → ECR push → Lambda 업데이트
  #         main 브랜치 push 시에만 실행
  # ──────────────────────────────────────────────────────────────────────────
  build-and-deploy-lambda:
    name: Build & Deploy Lambda (ECR)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        env:
          IMAGE_URI: ${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}
        run: |
          docker build \
            --tag "$IMAGE_URI" \
            --tag "${{ secrets.ECR_REPOSITORY }}:latest" \
            .

      - name: Push image to ECR
        env:
          IMAGE_URI: ${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}
        run: |
          docker push "$IMAGE_URI"
          docker push "${{ secrets.ECR_REPOSITORY }}:latest"

      - name: Update Lambda function image
        env:
          IMAGE_URI: ${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}
        run: |
          aws lambda update-function-code \
            --function-name "${{ secrets.LAMBDA_FUNCTION_NAME }}" \
            --image-uri "$IMAGE_URI"

          # 업데이트 완료까지 대기 (이후 트래픽이 새 이미지로 라우팅됨)
          aws lambda wait function-updated \
            --function-name "${{ secrets.LAMBDA_FUNCTION_NAME }}"

          echo "Lambda updated to image: $IMAGE_URI"
